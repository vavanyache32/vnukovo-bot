- name: Provision vnukovo-bot host
  hosts: all
  become: true
  vars:
    botuser: botuser
  tasks:
    - apt:
        update_cache: yes
        upgrade: dist
    - apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Add docker apt key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Configure docker apt repository
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable\n"

    - apt:
        update_cache: yes
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present

    - user:
        name: "{{ botuser }}"
        shell: /bin/bash
        groups: docker
        append: true

    - copy:
        src: ../systemd/vnukovo-bot.service
        dest: /etc/systemd/system/vnukovo-bot.service
        mode: '0644'
      notify: reload systemd

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
