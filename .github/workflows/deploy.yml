name: deploy

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/vnukovo-bot
            git fetch --tags
            export TAG="${{ github.event.workflow_run.head_branch }}"
            bash deploy/scripts/deploy.sh "$TAG"

      - name: Notify telegram channel
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}
        run: |
          status="${{ job.status }}"
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="vnukovo-bot deploy: ${status} (${{ github.event.workflow_run.head_sha }})"
